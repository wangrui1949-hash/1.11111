<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Story</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a1a35, #102a0d);
      color: #fff;
      font-family: "DM Sans", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    h1 {
      font-family: "Playfair Display", serif;
      margin-bottom: 30px;
      text-align: center;
    }
    img, video {
      width: 100%;
      border-radius: 16px;
      margin: 20px 0;
      display: block;
    }
    .back-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 24px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <h1>Magic Story</h1>

  <!-- 替换成你的图片 -->
  <img src="你的图片3.jpg" alt="作品图片">

  <!-- 替换成你的视频 -->
  <video controls>
    <source src="你的视频3.mp4" type="video/mp4">
  </video>

  <a href="index.html" class="back-btn">← 返回首页</a>
</body>
</html>
