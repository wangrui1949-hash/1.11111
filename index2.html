<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* ============ 【可改】主题颜色变量 ============ */
        :root { 
            --primary-green: #4a7c59;      /* 主绿色 - 按钮/强调色 */
            --hover-green: #3d6849;         /* 悬停绿色 - 按钮悬停 */
            --accent-orange: #d4a574;       /* 点缀橙色 - 星星/高亮 */
            --text-dark: #2d3e2b;           /* 深色文字 */
        }
        
        /* ============ 【不要改】全局重置 ============ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', 'Noto Serif TC', serif; 
            background-color: #f5f0e8; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* ============ 【可改】背景图层 ============ */
        #bg-layer { 
            position: fixed; 
            inset: 0; 
            z-index: -10; 
            background-size: cover; 
            background-position: center; 
            transition: background-image 1s ease-in-out;  /* 背景切换动画 */
            transform: scale(1.05);  /* 防止模糊边缘留白 */
        }

        /* ============ 【可改】返回首页按钮（左上角） ============ */
        .back-to-html1 {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,245,0.9);
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 999;
            backdrop-filter: blur(6px);
            transition: all 0.3s;
        }
        .back-to-html1:hover {
            background: var(--primary-green);
            color: #fff;
            transform: scale(1.05);
        }
        
        /* ============ 【可改】语言切换按钮（右上角） ============ */
        .lang-switch-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 245, 0.85);
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 6px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 150;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .lang-switch-btn:hover {
            background: var(--primary-green);
            color: white;
            transform: scale(1.05);
        }

        /* ============ 【可改】毛玻璃卡片容器 ============ */
        .liquid-glass { 
            position: relative;
            background: rgba(255, 255, 245, 0.88); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border-radius: 2.5rem; 
            padding: 3.5rem 3rem 3rem 3rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08); 
            border: 1px solid rgba(120,90,40,0.1); 
            max-width: 500px; 
            width: 90%; 
            text-align: center; 
            display: none;  /* 默认隐藏，通过 .active 显示 */
            animation: fadeIn 0.5s ease-out forwards; 
        }
        .active { display: block; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* ============ 【可改】卡片内返回箭头（右上角） ============ */
        .back-arrow {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            font-size: 1.8rem;
            color: var(--primary-green);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            line-height: 1;
            font-weight: bold;
        }
        .back-arrow:hover {
            color: var(--accent-orange);
            transform: scale(1.2);
        }

        /* ============ 【可改】主要按钮样式 ============ */
        .btn-primary { 
            background: var(--primary-green); 
            color: white; 
            border: none; 
            border-radius: 999px; 
            padding: 0.8rem 2.5rem; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 1rem; 
        }
        .btn-primary:hover { background: var(--hover-green); transform: scale(1.05); }
        
        /* ============ 【可改】小精灵容器（右下角） ============ */
        #elf-container { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
        }
        #elf-avatar { 
            font-size: 5rem; 
            cursor: pointer; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); 
        }
        .floating { animation: floating 3s ease-in-out infinite; }
        
        @keyframes floating { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-15px); } 
        }
        
        /* ============ 【可改】聊天窗口样式 ============ */
        #chat-window { 
            width: 280px; 
            height: 350px; 
            background: white; 
            border-radius: 1.5rem; 
            margin-bottom: 15px; 
            display: none; 
            flex-direction: column; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); 
            border: 1px solid rgba(74, 124, 89, 0.2); 
            overflow: hidden; 
        }
        #chat-header { 
            background: var(--primary-green); 
            color: white; 
            padding: 10px 15px; 
            font-size: 0.9rem; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
        }
        #chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            background: #fcfaf7; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        .msg { 
            padding: 8px 12px; 
            border-radius: 12px; 
            font-size: 0.85rem; 
            max-width: 85%; 
            line-height: 1.4; 
        }
        .msg-elf { background: #eef5ef; color: #3d6849; align-self: flex-start; }
        .msg-user { background: var(--primary-green); color: white; align-self: flex-end; }
        
        #chat-input-wrap { 
            padding: 10px; 
            display: flex; 
            gap: 5px; 
            border-top: 1px solid #eee; 
        }
        #chat-input { 
            flex: 1; 
            border: 1px solid #eee; 
            border-radius: 20px; 
            padding: 5px 15px; 
            outline: none; 
        }
        
        /* ============ 【可改】分支按钮容器 ============ */
        .branch-container { 
            position: fixed; 
            bottom: 15%; 
            display: flex; 
            gap: 20px; 
            z-index: 20; 
        }
        
        /* ============ 【可改】星级评分样式 ============ */
        .star-rating span { cursor: pointer; font-size: 1.5rem; color: #ccc; }
        .star-rating span.active { color: var(--accent-orange); }
    </style>

    <!-- ============ 【可改】返回首页按钮 ============ -->
    <button class="back-to-html1" onclick="goBackToHtml1()">← 返回首页</button>

        <h2 id="p1-subtitle">很高興認識你</h2>
        <p id="p1-desc" style="color: #666; line-height: 1.6">
            點擊右下角的<span style="color: var(--primary-green); font-weight: bold">小精靈</span>，她隨時準備好跟你聊天喔！✨
        </p>
        <button id="p1-btn" class="btn-primary" onclick="showPage(2)">進入冒險 →</button>
    </div>

    <!-- ============ 页面2：引导页 ============ -->

        <button id="p2-btn" class="btn-primary" onclick="showPage(3)">讓我想想 →</button>
    </div>

    <!-- ============ 页面3：选择分歧 ============ -->

    </div>
    <!-- ✅ 分支按钮容器，点击后显示 -->

        <button id="btn-improve" class="btn-primary" style="background:#d4a574" onclick="handleChoice('improve')">🌱 要改進</button>
    </div>

    <!-- ============ 页面4：喜欢路径 ============ -->

        <span class="back-arrow" onclick="goBack()" title="返回上一步">←</span>

        <p id="p4-desc" style="color: #444; font-weight: 500">看這陽光多燦爛，心情也跟著變好了！</p>
        <button id="p4-btn" class="btn-primary" onclick="showPage(6)">留下足跡 →</button>
    </div>

    <!-- ============ 页面5：改进路径 ============ -->
    <div id="page-5" class="liquid-glass">
        <div style="font-size: 4rem; margin-bottom: 1rem">📝</div>
        <span class="back-arrow" onclick="goBack()" title="返回上一步">←</span>
        <h2 id="p5-title">超級需要你的建議</h2>
        <p id="p5-desc" style="color: #666">每一顆種子都需要細心灌溉...</p>
        <button id="p5-btn" class="btn-primary" onclick="showPage(6)">寫下建議 →</button>
    </div>

    <!-- ============ 页面6：反馈表单 ============ -->
    <div id="page-6" class="liquid-glass" style="max-width: 600px;">
        <span class="back-arrow" onclick="goBack()" title="返回上一步">←</span>
        <h2 id="p6-title" style="margin-bottom: 1rem; color: var(--text-dark);">📬 春天信箱</h2>
        <!-- ✅ 表单字段的 placeholder 也会随语言切换 -->
        <input type="text" id="form-name" placeholder="你的名字" style="margin-bottom:10px; padding:10px; border-radius:10px; border:1px solid #ddd; width:100%">
        <input type="email" id="form-email" placeholder="你的邮箱📮" style="margin-bottom:10px; padding:10px; border-radius:10px; border:1px solid #ddd; width:100%">
        <textarea id="form-msg" rows="4" placeholder="分享你的想法..." style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
        <div class="star-rating" id="star-wrap">
            <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>
        <button id="p6-btn" class="btn-primary" style="width:100%" onclick="submitFeedback()">💌 送出回饋信</button>
    </div>

    <!-- ============ 结束页 ============ -->

        <div style="font-size: 4rem; margin-bottom: 1rem">✨</div>

    </div>

        </div>

            finish: "https://i.pinimg.com/736x/be/a7/ab/bea7ab20b6fbd0d5341edadc941f79d2.jpg",
        };

        // ============ 【不要改】页面历史记录（用于返回功能） ============
        let pageHistory = [1];
        // 初始化背景
        document.getElementById('bg-layer').style.backgroundImage = `url(${backgrounds.home})`;

        // ============ 🔹 切换语言主函数 ============
        function toggleLanguage() {
            // 循环切换：繁 → 简 → 英 → 繁
            if (currentLang === 'zh') currentLang = 'chs';
            else if (currentLang === 'chs') currentLang = 'en';
            else currentLang = 'zh';
            
            updateLanguageUI();  // 更新所有文字
        }

        // ============ 🔹 更新界面所有文字 ============
        function updateLanguageUI() {
            const d = translations[currentLang];
            
            // 1. 更新顶部按钮
            document.querySelector('.lang-switch-btn').innerText = d.langBtn;
            document.querySelector('.back-to-html1').innerText = d.backHome;

            // 2. 更新第1页
            document.getElementById('p1-title').innerText = d.p1Title;
            document.getElementById('p1-subtitle').innerText = d.p1Subtitle;
            document.getElementById('p1-desc').innerHTML = d.p1Desc;  // 用 innerHTML 支持 <span> 标签
            document.getElementById('p1-btn').innerText = d.p1Btn;

            // 3. 更新第2页
            document.getElementById('p2-title').innerText = d.p2Title;
            document.getElementById('p2-desc').innerHTML = d.p2Desc;
            document.getElementById('p2-btn').innerText = d.p2Btn;

            // 4. 更新第3页 + 分支按钮
            document.getElementById('p3-title').innerText = d.p3Title;
            document.getElementById('p3-desc').innerText = d.p3Desc;  
            document.getElementById('btn-like').innerText = d.btnLike;
            document.getElementById('btn-improve').innerText = d.btnImprove;

            // 5. 更新第4-5页
            document.getElementById('p4-title').innerText = d.p4Title;
            document.getElementById('p4-desc').innerText = d.p4Desc;
            document.getElementById('p4-btn').innerText = d.p4Btn;
            document.getElementById('p5-title').innerText = d.p5Title;
            document.getElementById('p5-desc').innerText = d.p5Desc;
            document.getElementById('p5-btn').innerText = d.p5Btn;

            // 6. 更新第6页（表单）
            document.getElementById('p6-title').innerText = d.p6Title;
            document.getElementById('form-name').placeholder = d.p6Name;
            document.getElementById('form-email').placeholder = d.p6Email;
            document.getElementById('form-msg').placeholder = d.p6Msg;
            document.getElementById('p6-btn').innerText = d.p6Btn;

            // 7. 更新结束页
            document.getElementById('pf-title').innerText = d.pfTitle;
            document.getElementById('pf-btn').innerText = d.pfBtn;

            // 8. 更新聊天组件
            document.getElementById('chat-title').innerText = d.chatTitle;
            document.getElementById('chat-input').placeholder = d.chatPlaceholder;
            document.getElementById('chat-send-btn').innerText = d.chatSend;
        }

        // ============ 🔹 页面切换函数 ============
        function showPage(num, isBack = false) {
            // 记录页面历史（用于返回功能）
            if (!isBack && pageHistory[pageHistory.length - 1] !== num) {
                pageHistory.push(num);
            }

            // 隐藏所有页面，显示目标页面
            document.querySelectorAll('.liquid-glass').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + num).classList.add('active');
            
            // 控制分支按钮显示/隐藏
            if(num === 3) document.getElementById('branch-btns').style.display = 'flex';
            else document.getElementById('branch-btns').style.display = 'none';

            // 切换背景图
            const bgLayer = document.getElementById('bg-layer');
            if (num === 1) bgLayer.style.backgroundImage = `url(${backgrounds.home})`;
            else if (num === 2 || num === 3) bgLayer.style.backgroundImage = `url(${backgrounds.quest})`;
            else if (num === 4) bgLayer.style.backgroundImage = `url(${backgrounds.like})`;
            else if (num === 5 || num === 6) bgLayer.style.backgroundImage = `url(${backgrounds.improve})`;
            else if (num === 'finish') bgLayer.style.backgroundImage = `url(${backgrounds.finish})`;
        }

        // ============ 🔹 返回上一页 ============
        function goBack() {
            if (pageHistory.length > 1) {
                pageHistory.pop();  // 移除当前页
                const prevPage = pageHistory[pageHistory.length - 1];  // 获取上一页
                showPage(prevPage, true);  // 显示上一页
            }
        }

        // ============ 🔹 处理分支选择 ============
        function handleChoice(type) {
            // 切换背景
            document.getElementById('bg-layer').style.backgroundImage = `url(${backgrounds[type]})`;
            // 跳转到对应页面（喜欢→4，改进→5）
            showPage(type === 'like' ? 4 : 5);
        }

        // ============ 🔹 星级评分 ============
        let currentRating = 0;
        function setRating(r) {
            currentRating = r;
            document.querySelectorAll('#star-wrap span').forEach((s, i) => {
                s.classList.toggle('active', i < r);  // 点亮前 r 颗星
            });
        }

        // ============ 🔹 切换聊天窗口 ============
        function toggleChat() {
            const win = document.getElementById('chat-window');
            const isVisible = win.style.display === 'flex';
            win.style.display = isVisible ? 'none' : 'flex';
            
            // 首次打开时显示欢迎语
            if(!isVisible && document.getElementById('chat-messages').innerHTML === "") {
                addMessage('elf', translations[currentLang].chatWelcome);
            }
        }

        // ============ 🔹 添加聊天消息 ============
        function addMessage(role, text) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `msg msg-${role}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;  // 自动滚动到底部
        }

        // ============ 🔹 调用 DeepSeek API ============
        async function callDeepSeek(prompt, systemMsg) {
            const url = "https://api.deepseek.com/chat/completions";
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: "system", content: systemMsg },
                            { role: "user", content: prompt }
                        ],
                        stream: false
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error("DeepSeek Error:", error);
                // 出错时返回友好提示（随语言变化）
                return currentLang === 'zh' ? 
                    "哎呀，春天的小腦袋卡住了... 🌸 請再試一次！" : 
                    "Oops! The spring breeze got me dizzy... 🌸 Please try again!";
            }
        }

        // ============ 🔹 发送聊天消息 ============
        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            
            addMessage('user', text);  // 显示用户消息
            input.value = "";  // 清空输入框
            
            // 显示"发送中..."（可选优化）
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'msg msg-elf';
            loadingMsg.innerText = '🌸 思考中...';
            loadingMsg.id = 'loading-msg';
            document.getElementById('chat-messages').appendChild(loadingMsg);
            
            // 调用 AI
            const reply = await callDeepSeek(text, translations[currentLang].elfSystemPrompt);
            
            // 移除加载消息，显示回复
            document.getElementById('loading-msg')?.remove();
            addMessage('elf', reply);
        }

        // ============ 🔹 提交反馈表单 ============
        async function submitFeedback() {
            const name = document.getElementById('form-name').value.trim();
            const msg = document.getElementById('form-msg').value.trim();
            const dict = translations[currentLang];
            
            // 验证输入
            if(!name || !msg) {
                return alert(dict.alertFill);
            }

            // 1. 播放彩带动画
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
            
            // 2. 跳转到结束页
            showPage('finish');
            document.getElementById('bg-layer').style.backgroundImage = `url(${backgrounds.finish})`;
            document.getElementById('finish-msg').innerText = dict.fallbackMsg;

            // 3. 用 AI 生成个性化感谢语
            const res = await callDeepSeek(
                `User ${name} left a ${currentRating} star feedback: ${msg}`, 
                dict.elfThankSystemPrompt
            );
            document.getElementById('finish-msg').innerText = res;
        }

        // ============ 【不要改】监听 Enter 键发送消息 ============
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendChat();
        });

        // ============ 【不要改】页面加载时初始化 ============
        // 确保所有文字显示为默认语言（繁体）
        updateLanguageUI();
    </script>
</body>
</html>
