    <style>
        /* 全局设置 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* 黑色遮罩层 */
        #black-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 9999;
            transition: opacity 1.2s ease-out;
            pointer-events: none;
        }

        /* 主背景容器 */
        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.pinimg.com/1200x/33/68/3e/33683e59c765e20dd8f4478d04e244c1.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.7); 
            transform: scale(1.1);
            transition: filter 0.5s;
        }

        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .call-interface {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            width: 100%;
            padding: 60px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease-out 0.3s;
        }

        .call-interface.active {
            opacity: 1;
            transform: translateY(0);
        }
      .caller-subtitle {
    font-size: 15px;

    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-top: 6px;
    font-weight: 500;
}
        .avatar-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 4px solid rgba(255,255,255,0.1);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes ring {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(6deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-6deg); }
            100% { transform: rotate(0deg); }

        }

        .glass-panel {

        /* 顶部控制栏 → 移到左边 */

            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            gap: 15px;
            z-index: 50;
        }

        .control-btn {
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;

        }

        /* 右侧聊天记录侧边栏 */
        .chat-sidebar {

            right: 0;
            top: 0;
            bottom: 0;
            width: 380px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

        }

        .chat-content::-webkit-scrollbar { width: 6px; }

  .msg {
  /* 你原来的样式保留不变 */
  max-width: 85%;

.msg:hover {

        .msg-received {

<div class="mt-4 pt-4 border-t border-gray-300">

    <script>
  const API_KEY = "你的 DeepSeek API Key";
const API_URL = "https://api.deepseek.com/v1/chat/completions";

// 发送消息给 DeepSeek
async function sendToAI(message) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [{ role: "user", content: message }],
        temperature: 0.7
      })
    });
    const data = await res.json();
    return data.choices?.[0]?.message?.content || "AI 暂时无法回复";
  } catch (err) {
    console.error(err);
    return "嘻嘻，API太贵了，Reina还在攒钱中...注意⚠️：点击上面按钮，即可穿越时空噢！！快来体验吧～";
  }
}

// 发送消息的主函数
async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  // 显示用户消息
  addMessage(text, "user");
  input.value = "";

  // 显示“正在思考”状态
  addMessage("正在思考...", "bot");

  // 调用 AI 并替换状态消息
  const reply = await sendToAI(text);
  const messages = document.querySelectorAll("#aiChatMessages > div");
  messages[messages.length - 1].remove();

  // 显示 AI 回复
  addMessage(reply, "bot");
}

// 把消息添加到界面
function addMessage(text, type) {
  const container = document.getElementById("aiChatMessages");
  const div = document.createElement("div");
  div.className = `p-2 rounded-lg max-w-[80%] text-sm ${
    type === "user" 
      ? "bg-blue-100 text-blue-900 ml-auto text-right" 
      : "bg-gray-100 text-gray-800 mr-auto"
  }`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// 按回车发送消息
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("userInput");
  if (input) {
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  }
});

        let currentLang = 'zh';

        // 切换语言
function toggleLanguage() {
    if (currentLang === 'zh') currentLang = 'chs';
    else if (currentLang === 'chs') currentLang = 'en';
    else currentLang = 'zh';
    updateUI();
    renderChats();
}


        // ==================== 更新界面文字 ====================
        function updateUI() {
            const data = i18n[currentLang];
            
            // 更新所有带 data-i18n 属性的元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.innerText = data[key];
            });
            
            // 更新语言按钮文字
            document.getElementById('langText').innerText = data.langBtn;
            
            // 更新目录按钮文字
            const subtitleBtn = document.getElementById('subtitleText');
            const sidebar = document.getElementById('chatSidebar');
            subtitleBtn.innerText = sidebar.classList.contains('show') ? data.subtitleOff : data.subtitleOn;

                // 👇 加这两行
    document.getElementById('userInput').placeholder = data.aiPlaceholder;
    document.getElementById('sendBtn').innerText = currentLang == 'zh' ? '發送' : currentLang == 'chs' ? '发送' : 'Send';
        }
        // ==================== 渲染目录（带小字说明）====================
function renderChats() {
    const chatHistory = document.getElementById('chatHistory');
    chatHistory.innerHTML = '';
    
    const chats = i18n[currentLang].chats;
    chats.forEach((msg, index) => {
        const div = document.createElement('div');
        div.className = `msg msg-${msg.type}`;
        
        div.innerHTML = `
            <div style="font-weight: 600;">${msg.text}</div>
            <span class="msg-desc">${msg.desc}</span>
        `;
        
        // 🔥 核心修复：跳转后延迟 0.1 秒再滚动，破解自动回顶
        div.onclick = () => {
            if (msg.link.includes("#")) {
                window.location.href = msg.link;
                setTimeout(() => {
                    const id = msg.link.split("#")[1];
                    const target = document.getElementById(id);
                    if (target) target.scrollIntoView({ behavior: "smooth" });
                }, 100);
            } else {
                window.location.href = msg.link;
            }
        };
        
        div.style.animationDelay = `${index * 0.1}s`;
        chatHistory.appendChild(div);
    });
}



        // 切換目錄面板
        function toggleChat() {
            const sidebar = document.getElementById('chatSidebar');
            const btnText = document.getElementById('subtitleText');
            const data = i18n[currentLang];
            sidebar.classList.toggle('show');
            btnText.innerText = sidebar.classList.contains('show') ? data.subtitleOff : data.subtitleOn;
            if(sidebar.classList.contains('show')) renderChats();
        }

        // 頁面加載
        window.addEventListener('load', () => {
            const overlay = document.getElementById('black-overlay');
            const callInterface = document.getElementById('callInterface');
            setTimeout(() => {
                overlay.style.opacity = '0';
                callInterface.classList.add('active');
                setTimeout(() => {
                    document.querySelector('.avatar-wrapper').classList.add('ringing');
                }, 500);
                renderChats();
                updateUI();
            }, 1200);
        });

        // 接聽
function answerCall() {
    const avatarWrapper = document.querySelector('.avatar-wrapper');
    const timerDisplay = document.getElementById('timer');
    avatarWrapper.classList.remove('ringing');
    document.body.classList.add('call-active');
    let seconds = 0;
    setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
        const secs = (seconds % 60).toString().padStart(2, '0');
        timerDisplay.innerText = `${mins}:${secs}`;
    }, 1000);
    if (!document.getElementById('chatSidebar').classList.contains('show')) toggleChat();

    // 加在这里 👇
    setTimeout(() => {
    window.location.href = "index.html" + window.location.search;
}, 800); // 800毫秒后跳转，让动画先播放完，更自然
}

        // 掛斷
        function hangUp() {
            const callInterface = document.getElementById('callInterface');
            const overlay = document.getElementById('black-overlay');
            callInterface.style.opacity = '0';
            callInterface.style.transform = 'scale(0.9)';
            setTimeout(() => {
                overlay.style.opacity = '1';
                setTimeout(() => location.reload(), 1000);
            }, 500);
        }
